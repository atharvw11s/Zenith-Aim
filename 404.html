<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zenith Aim</title>
  <script>
    const path    = window.location.pathname;
    const section = path.replace(/\/+$/, '').split('/').pop();
    const valid   = ['routines', 'converters', 'warmup'];
    const base    = window.location.origin + '/AimRivals-Upgraded';

    if (valid.includes(section)) {
      // Redirect to the folder index.html which renders the correct tab
      window.location.replace(base + '/' + section + '/index.html');
    } else {
      window.location.replace(base + '/');
    }
  </script>
  <style>
    body { background:#080612; color:#ede8f8; font-family:sans-serif;
           display:flex; align-items:center; justify-content:center;
           min-height:100vh; margin:0; }
    p { opacity:.4; font-size:13px; }
  </style>
</head>
<body><p>Loading…</p></body>
</html>
